name: Daily Fork Sync

on:
  # Runs at 00:00 every day
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # allow the default GITHUB_TOKEN to push

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # grab full history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add & fetch upstream
        run: |
          git remote add upstream https://github.com/ash-project/ash.git
          git fetch --prune upstream

      - name: Fast‑forward fork from upstream/main
        run: |
          git checkout main
          git merge --ff-only upstream/main || echo "Already up to date"

      - name: Push (only if there are new commits)
        run: |
          git push origin main


